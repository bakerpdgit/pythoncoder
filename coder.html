    <!-- Worker-backed trace runtime plus a main-thread execution scaffold. -->

    <!-- Pyodide worker script, dynamically loaded -->
    <script id="worker-script" type="text/javascript">
      self.onmessage = async function (e) {
        if (e.data.type === "init") {
          try {
            importScripts(
              "https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js",
            );
          } catch (error) {
            postMessage({
              type: "error",
              error:
                "Failed to load Pyodide in the worker. If Cross-Origin Isolation is enabled, all remote scripts must allow CORS/CORP. " +
                error.message,
            });
            return;
          }

          const sab = e.data.sab;
          const int32View = new Int32Array(sab);
          const uint8View = new Uint8Array(sab);

          let pyodide = await loadPyodide({
            stdout: (text) => postMessage({ type: "print", text }),
            stderr: (text) => postMessage({ type: "error", error: text }),
          });

          // Expose JS blocking functions to Python
          pyodide.globals.set(
            "js_trace_callback",
            (line, func, cls, stateStr) => {
              postMessage({ type: "trace", line, func, cls, state: stateStr });

              // Block execution until Main thread wakes us up via SAB
              Atomics.store(int32View, 0, 1);
              Atomics.wait(int32View, 0, 1);

              // Read command and sync breakpoints into Python global (SAB slots 500-599)
              const cmd = Atomics.load(int32View, 1);
              const bpCount = Atomics.load(int32View, 500);
              const bps = [];
              for (let i = 0; i < bpCount && i < 99; i++) {
                bps.push(Atomics.load(int32View, 501 + i));
              }
              pyodide.globals.set("current_breakpoints", pyodide.toPy(bps));
              return cmd;
            },
          );

          pyodide.globals.set("js_input_callback", (promptText) => {
            postMessage({ type: "input", prompt: promptText });

            // Block execution for input string
            Atomics.store(int32View, 0, 2);
            Atomics.wait(int32View, 0, 2);

            const len = Math.max(0, Atomics.load(int32View, 2));
            const decoder = new TextDecoder();
            const copiedBytes = new Uint8Array(len);
            copiedBytes.set(uint8View.subarray(12, 12 + len));
            return decoder.decode(copiedBytes);
          });

          // Non-blocking state push — called by Python's my_input before blocking for user input
          pyodide.globals.set("js_send_state", (line, func, cls, stateStr) => {
            postMessage({ type: "trace", line, func, cls, state: stateStr });
          });

          // Python Tracing Logic via sys.settrace
          const setupCode = `
import ast
import sys
import json
import builtins

# Override built-in input to use our blocking SAB implementation
def my_input(prompt=""):
    # Push a fresh state snapshot so the inspectors are current when the input bar appears
    try:
        caller = sys._getframe(1)
        fn, cls, st = snapshot_state(caller)
        js_send_state(caller.f_lineno, fn, cls, st)
    except Exception:
        pass
    return js_input_callback(prompt)
builtins.input = my_input

source_lines = user_code_str.splitlines()

tree = ast.parse(user_code_str, filename="simulation.py")
control_blocks = []
for node in ast.walk(tree):
    if isinstance(node, (ast.If, ast.For, ast.While)) and hasattr(node, "end_lineno"):
        control_blocks.append({
            "start": node.lineno,
            "end": node.end_lineno,
            "kind": type(node).__name__,
        })

frame_depths = {}
pending_action = None
current_breakpoints = []
MAX_ITEMS = 120
MAX_STRING = 120

def is_serializable_local(name, value):
    if name.startswith("__"):
        return False
    if callable(value):
        return False
    if isinstance(value, type(sys)):
        return False
    return True

def format_scalar(value):
    if isinstance(value, str):
        if len(value) > MAX_STRING:
            return value[: MAX_STRING - 1] + "…"
        return value
    if isinstance(value, float):
        return round(value, 4)
    return value

def summarize_value(value):
    if isinstance(value, str):
        preview = format_scalar(value)
        return repr(preview)
    if value is None or isinstance(value, (bool, int, float)):
        return repr(value)
    if isinstance(value, (list, tuple, set)):
        return f"{type(value).__name__}[{len(value)}]"
    if isinstance(value, dict):
        return f"dict {{{len(value)}}}"
    return getattr(value, "__class__", type(value)).__name__

def serialize_value(value, path_ids=None):
    if path_ids is None:
        path_ids = set()

    if value is None or isinstance(value, (bool, int, float, str)):
        return {
            "kind": "primitive",
            "type": type(value).__name__,
            "value": format_scalar(value),
            "summary": summarize_value(value),
        }

    if isinstance(value, (list, tuple, set)):
        object_id = id(value)
        if object_id in path_ids:
            return {
                "kind": "reference",
                "type": type(value).__name__,
                "summary": f"{type(value).__name__} (circular)",
            }

        next_ids = set(path_ids)
        next_ids.add(object_id)
        sequence = list(value)
        return {
            "kind": "sequence",
            "type": type(value).__name__,
            "length": len(sequence),
            "summary": f"{type(value).__name__}[{len(sequence)}]",
            "truncated": len(sequence) > MAX_ITEMS,
            "items": [
                {
                    "label": f"[{index}]",
                    "value": serialize_value(item, next_ids),
                }
                for index, item in enumerate(sequence[:MAX_ITEMS])
            ],
        }

    if isinstance(value, dict):
        object_id = id(value)
        if object_id in path_ids:
            return {
                "kind": "reference",
                "type": "dict",
                "summary": "dict (circular)",
            }

        next_ids = set(path_ids)
        next_ids.add(object_id)
        entries = []
        for key, item in list(value.items())[:MAX_ITEMS]:
            if callable(item) or isinstance(item, type(sys)):
                continue
            entries.append({
                "label": repr(key),
                "value": serialize_value(item, next_ids),
            })
        return {
            "kind": "mapping",
            "type": "dict",
            "length": len(value),
            "summary": f"dict {{{len(value)}}}",
            "truncated": len(value) > MAX_ITEMS,
            "entries": entries,
        }

    if hasattr(value, "__dict__"):
        object_id = id(value)
        if object_id in path_ids:
            return {
                "kind": "reference",
                "type": value.__class__.__name__,
                "summary": f"{value.__class__.__name__} (circular)",
            }

        next_ids = set(path_ids)
        next_ids.add(object_id)
        attributes = []
        for name, item in value.__dict__.items():
            if name.startswith("__") or callable(item) or isinstance(item, type(sys)):
                continue
            attributes.append({
                "label": name,
                "value": serialize_value(item, next_ids),
            })
        return {
            "kind": "object",
            "type": value.__class__.__name__,
            "summary": f"{value.__class__.__name__} ({len(attributes)} attrs)",
            "attrs": attributes,
        }

    return {
        "kind": "primitive",
        "type": type(value).__name__,
        "value": summarize_value(value),
        "summary": summarize_value(value),
    }

def build_scope_snapshot(frame, func_name):
    parameter_names = []
    positional_and_keyword = frame.f_code.co_argcount + frame.f_code.co_kwonlyargcount
    parameter_names.extend(frame.f_code.co_varnames[:positional_and_keyword])

    next_index = positional_and_keyword
    if frame.f_code.co_flags & 0x04:
        parameter_names.append(frame.f_code.co_varnames[next_index])
        next_index += 1
    if frame.f_code.co_flags & 0x08:
        parameter_names.append(frame.f_code.co_varnames[next_index])

    parameter_entries = []
    seen_names = set()
    for name in parameter_names:
        if name not in frame.f_locals:
            continue
        value = frame.f_locals[name]
        if not is_serializable_local(name, value):
            continue
        seen_names.add(name)
        parameter_entries.append({
            "label": name,
            "value": serialize_value(value),
        })

    local_entries = []
    for name, value in frame.f_locals.items():
        if name in seen_names or not is_serializable_local(name, value):
            continue
        local_entries.append({
            "label": name,
            "value": serialize_value(value),
        })

    locals_view = {
        "label": f"{func_name} locals",
        "node": {
            "kind": "scope",
            "type": func_name,
            "summary": f"{len(parameter_entries)} params • {len(local_entries)} locals",
            "entries": [
                {
                    "label": "Parameters",
                    "value": {
                        "kind": "mapping",
                        "type": "parameters",
                        "length": len(parameter_entries),
                        "summary": f"{len(parameter_entries)} parameters",
                        "entries": parameter_entries,
                    },
                },
                {
                    "label": "Locals",
                    "value": {
                        "kind": "mapping",
                        "type": "locals",
                        "length": len(local_entries),
                        "summary": f"{len(local_entries)} locals",
                        "entries": local_entries,
                    },
                },
            ],
        },
    }

    global_entries = []
    for name, value in frame.f_globals.items():
        if not is_serializable_local(name, value):
            continue
        if name.startswith("_"):
            continue
        global_entries.append({
            "label": name,
            "value": serialize_value(value),
        })

    globals_view = {
        "label": "Global Variables",
        "node": {
            "kind": "scope",
            "type": "globals",
            "summary": f"{len(global_entries)} globals",
            "entries": [
                {
                    "label": "Globals",
                    "value": {
                        "kind": "mapping",
                        "type": "globals",
                        "length": len(global_entries),
                        "summary": f"{len(global_entries)} globals",
                        "entries": global_entries,
                    },
                }
            ],
        },
    }

    return {
        "key": f"frame:{id(frame)}:{func_name}",
        "label": func_name,
        "views": {
            "locals": locals_view,
            "globals": globals_view,
        },
    }

def ensure_frame_depth(frame):
    frame_id = id(frame)
    if frame_id not in frame_depths:
        parent = frame.f_back
        parent_depth = frame_depths.get(id(parent), -1) if parent is not None else -1
        frame_depths[frame_id] = parent_depth + 1
    return frame_depths[frame_id]

def get_depth(frame):
    return ensure_frame_depth(frame)

def find_innermost_control_block(line_no):
    matches = [block for block in control_blocks if block["start"] <= line_no <= block["end"]]
    if not matches:
        return None
    return min(matches, key=lambda block: (block["end"] - block["start"], -block["start"]))

def should_pause(frame, line_no):
    global pending_action
    if pending_action is None:
        return True

    action_type = pending_action["type"]
    depth = get_depth(frame)
    frame_id = id(frame)

    if action_type == "step_over":
        if depth > pending_action["depth"]:
            return False
        if depth == pending_action["depth"] and frame_id == pending_action["frame_id"] and line_no == pending_action["line"]:
            return False
        pending_action = None
        return True

    if action_type == "out_block":
        if depth > pending_action["depth"]:
            return False
        if depth == pending_action["depth"] and frame_id == pending_action["frame_id"] and pending_action["start"] <= line_no <= pending_action["end"]:
            return False
        pending_action = None
        return True

    if action_type == "out_function":
        if depth > pending_action["depth"]:
            return False
        pending_action = None
        return True

    if action_type == "continue":
        if line_no in current_breakpoints:
            pending_action = None
            return True
        return False

    pending_action = None
    return True

def snapshot_state(frame):
    """Return (func_name, class_name, sim_state_json) for the given frame."""
    func_name = frame.f_code.co_name
    class_name = ""
    if "self" in frame.f_locals:
        class_name = frame.f_locals["self"].__class__.__name__
    try:
        return func_name, class_name, json.dumps({
            "Inspector": build_scope_snapshot(frame, func_name),
        })
    except Exception:
        pass
    try:
        return func_name, class_name, json.dumps({
            "Inspector": build_scope_snapshot(frame, func_name),
        })
    except Exception:
        return func_name, class_name, "{}"

def trace_calls(frame, event, arg):
    global pending_action

    if frame.f_code.co_filename != "simulation.py":
        return trace_calls

    if event == "call":
        ensure_frame_depth(frame)
        return trace_calls

    if event == "return":
        frame_depths.pop(id(frame), None)
        return trace_calls

    if event != "line":
        return trace_calls

    ensure_frame_depth(frame)
    line_no = frame.f_lineno

    # Skip def/class/decorator lines — they define, not execute, so no value pausing there
    if line_no <= len(source_lines):
        stripped = source_lines[line_no - 1].strip()
        if stripped.startswith('def ') or stripped.startswith('class ') or stripped.startswith('@'):
            return trace_calls

    if not should_pause(frame, line_no):
        return trace_calls

    func_name, class_name, sim_state = snapshot_state(frame)
    current_depth = get_depth(frame)

    # Send execution state to JS and block. Receive command when unblocked.
    cmd = js_trace_callback(line_no, func_name, class_name, sim_state)

          const indent =

            contextStack.length > 0 &&
            indent <= contextStack[contextStack.length - 1].indent

            const classItem = {
              type: "class",
              name: classMatch[1],
              interface: trimmedLine,
              line: index + 1,
              indent,
              methods: [],
            };
            items.push(classItem);

            return;

          const defMatch = trimmedLine.match(
            /^def\s+([A-Za-z_][A-Za-z0-9_]*)\s*\(/,
          );
          if (!defMatch) return;

          const classContext = [...contextStack]
            .reverse()
            .find((entry) => entry.type === "class");
          const className =

          const definition = {

            name: defMatch[1],
            className,
            key: getDefinitionKey(defMatch[1], className),
            interface: trimmedLine,
            line: index + 1,
            indent,
          };
          definitionByKey[definition.key] = definition;

          if (className) {
            classContext.item.methods.push(definition);
          } else {
            items.push(definition);
          }

          contextStack.push({ type: "def", indent, item: definition });
        });

        return {
          items,
          definitionByKey,
          orderedDefinitions: Object.values(definitionByKey).sort(
            (left, right) => left.line - right.line,

            output.push(item.interface);

        const trimmed = lines[firstContentIndex]?.trim() || "";
        if (
          !trimmed.startsWith('"""') &&

    def __init__(self):

        self._time = 0
        self._rawtime = 0
        self._fps = 0.0

    def _sample(self):
        now = time.perf_counter()
        elapsed = max(0.0, now - self._last)
        self._last = now
        milliseconds = int(round(elapsed * 1000))
        self._time = milliseconds
        self._rawtime = milliseconds
        self._fps = (1.0 / elapsed) if elapsed > 1e-9 else 0.0
        return milliseconds

    def tick(self, fps=0):
        return self._sample()

    def tick_busy_loop(self, fps=0):
        return self._sample()

    def get_time(self):
        return self._time

    def get_rawtime(self):
        return self._rawtime

    def get_fps(self):
        return self._fps

        const funcNames = new Set(orderedNames);
        orderedNames.forEach((name) => {
          functionDefs[name].calls = functionDefs[name].calls.filter((c) =>
            funcNames.has(c),
          );
        });

        // Functions called by at least one other function
        const calledFunctions = new Set();
        orderedNames.forEach((name) => {
          functionDefs[name].calls.forEach((c) => calledFunctions.add(c));
        });

        // Root functions = not called by any other user function
        const roots = orderedNames.filter(
          (name) => !calledFunctions.has(name),
        );

        return { functionDefs, orderedNames, roots };
      };

      const makeOutlineNode = (kind, name, line, extra = {}) => ({
        id: `${kind}:${name}:${line}:${extra.owner || ""}`,
        kind,
        name,
        line,
        children: [],
        ...extra,
      });

      const getOutlineContainer = (stack) => {
        for (let index = stack.length - 1; index >= 0; index -= 1) {
          if (stack[index].node) return stack[index].node.children;
        }
        return null;
      };

      const parsePythonParameters = (signaturePart) =>
        (signaturePart || "")
          .split(",")
          .map((part) =>
            part
              .replace(/=.*/, "")
              .replace(/:.*/, "")
              .replace(/^[*]+/, "")
              .trim(),
          )
          .filter((name) => /^[A-Za-z_][A-Za-z0-9_]*$/.test(name));

      const addUniqueOutlineChild = (parent, child) => {
        if (!parent.children.some((node) => node.kind === child.kind && node.name === child.name)) {
          parent.children.push(child);
        }
      };

      const analyzePythonOutline = (source) => {
        const lines = cleanCodeText(source).split("\n");
        const roots = [];
        const stack = [];

        const nearestScope = (kind) => {
          for (let index = stack.length - 1; index >= 0; index -= 1) {
            if (stack[index].type === kind) return stack[index];
          }
          return null;
        };

        const appendToCurrentContainer = (node) => {
          const container = getOutlineContainer(stack);
          if (container) container.push(node);
          else roots.push(node);
        };

        lines.forEach((rawLine, index) => {
          const expandedLine = rawLine.replace(/\t/g, "    ");
          const trimmedLine = expandedLine.trim();
          if (!trimmedLine || trimmedLine.startsWith("#")) return;

          const line = index + 1;
          const indent = expandedLine.length - expandedLine.trimStart().length;

          while (
            stack.length > 0 &&
            indent <= stack[stack.length - 1].indent
          ) {
            stack.pop();
          }

          const classMatch = trimmedLine.match(
            /^class\s+([A-Za-z_][A-Za-z0-9_]*)\b/,
          );
          if (classMatch) {
            const classNode = makeOutlineNode("class", classMatch[1], line);
            appendToCurrentContainer(classNode);
            stack.push({ type: "class", indent, node: classNode });
            return;
          }

          const defMatch = trimmedLine.match(
            /^def\s+([A-Za-z_][A-Za-z0-9_]*)\s*\(([^)]*)\)/,
          );
          if (defMatch) {
            const ownerClass = nearestScope("class")?.node || null;
            const defNode = makeOutlineNode(
              ownerClass ? "method" : "function",
              defMatch[1],
              line,
              { owner: ownerClass?.name || "" },
            );
            parsePythonParameters(defMatch[2]).forEach((paramName) => {
              if (paramName === "self") return;
              addUniqueOutlineChild(
                defNode,
                makeOutlineNode("parameter", paramName, line, {
                  owner: defNode.name,
                }),
              );
            });
            appendToCurrentContainer(defNode);
            stack.push({ type: "function", indent, node: defNode });
            return;
          }

          const currentFunction = nearestScope("function")?.node || null;
          const currentClass = nearestScope("class")?.node || null;
          const selfAttrMatch = trimmedLine.match(
            /^self\.([A-Za-z_][A-Za-z0-9_]*)\s*(?::[^=]+)?=/,
          );
          if (selfAttrMatch && currentClass) {
            addUniqueOutlineChild(
              currentClass,
              makeOutlineNode("attribute", selfAttrMatch[1], line, {
                owner: currentClass.name,
              }),
            );
            return;
          }

          const assignmentMatch = trimmedLine.match(
            /^([A-Za-z_][A-Za-z0-9_]*)\s*(?::[^=]+)?=/,
          );
          if (assignmentMatch) {
            const name = assignmentMatch[1];
            if (currentFunction) {
              addUniqueOutlineChild(
                currentFunction,
                makeOutlineNode("local", name, line, {
                  owner: currentFunction.name,
                }),
              );
            } else if (currentClass) {
              addUniqueOutlineChild(
                currentClass,
                makeOutlineNode("attribute", name, line, {
                  owner: currentClass.name,
                }),
              );
            } else {
              roots.push(
                makeOutlineNode(
                  name === name.toUpperCase() ? "constant" : "global",
                  name,
                  line,
                ),
              );
            }
          }
        });

        return { roots, lines: lines.length };
      };

      const walkOutlineNodes = (nodes, callback) => {
        nodes.forEach((node) => {
          callback(node);
          if (node.children?.length) walkOutlineNodes(node.children, callback);
        });
      };

      const getExpandableOutlineIds = (outlineModel) => {
        const ids = [];
        walkOutlineNodes(outlineModel?.roots || [], (node) => {
          if (node.children?.length) ids.push(node.id);
        });
        return ids;
      };

      const countOutlineNodes = (outlineModel) => {
        let count = 0;
        walkOutlineNodes(outlineModel?.roots || [], () => {
          count += 1;
        });
        return count;
      };

      // ─── Hierarchy chart layout & rendering ──────────────────────────────────

      const DIAGRAM_FONT_DEFAULT = 11;
      const DIAGRAM_FONT_MIN = 8;
      const DIAGRAM_FONT_MAX = 20;

      const clampDiagramFontSize = (value) =>
        Math.min(DIAGRAM_FONT_MAX, Math.max(DIAGRAM_FONT_MIN, value));

      const getHierarchyMetrics = (fontSize) => {
        const safeFontSize = clampDiagramFontSize(fontSize);
        const scale = safeFontSize / DIAGRAM_FONT_DEFAULT;
        return {
          fontSize: safeFontSize,
          scale,
          charWidth: 7 * scale,
          labelPadding: 6 * scale,
          nodeHeight: Math.max(28, Math.round(34 * scale)),
          nodeGap: Math.max(8, Math.round(12 * scale)),
          levelGap: Math.max(64, Math.round(80 * scale)),
          rootGap: Math.max(12, Math.round(18 * scale)),
          busOffset: Math.max(16, Math.round(20 * scale)),
          minNodeWidth: Math.max(36, Math.round(36 * scale)),
        };
      };

      const getDiagramNodeWidth = (label, metrics) =>
        Math.max(
          metrics.minNodeWidth,
          metrics.maxNodeWidth
            ? Math.min(
                metrics.maxNodeWidth,
                Math.round(
                  label.length * metrics.charWidth + metrics.labelPadding,
                ),
              )
            : Math.round(label.length * metrics.charWidth + metrics.labelPadding),
        );

      const getUmlMetrics = (fontSize) => {
        const safeFontSize = clampDiagramFontSize(fontSize);
        const scale = safeFontSize / DIAGRAM_FONT_DEFAULT;
        return {
          fontSize: safeFontSize,
          scale,
          charWidth: 7 * scale,
          labelPadding: 34 * scale,
          minNodeWidth: Math.max(76, Math.round(92 * scale)),
          maxNodeWidth: Math.max(140, Math.round(170 * scale)),
          nodeHeight: Math.max(28, Math.round(34 * scale)),
          groupGap: Math.max(24, Math.round(36 * scale)),
          nodeGap: Math.max(8, Math.round(12 * scale)),
          sectionGap: Math.max(32, Math.round(48 * scale)),
          compositionChildOffset: Math.max(72, Math.round(88 * scale)),
          compositionGroupHeight: Math.max(118, Math.round(144 * scale)),
          compositionMinHeight: Math.max(160, Math.round(180 * scale)),
          inheritanceLevelGap: Math.max(72, Math.round(96 * scale)),
          rootGap: Math.max(12, Math.round(18 * scale)),
          busOffset: Math.max(22, Math.round(28 * scale)),
          topPadding: Math.max(24, Math.round(28 * scale)),
          footerPadding: Math.max(36, Math.round(42 * scale)),
          sectionLabelFontSize: Math.max(10, Math.round(11 * scale)),
          emptyMessageFontSize: Math.max(11, Math.round(12 * scale)),
          sectionLabelY: Math.max(16, Math.round(16 * scale)),
          compositionEmptyY: Math.max(58, Math.round(58 * scale)),
          inheritanceLabelOffset: Math.max(18, Math.round(18 * scale)),
          diamondHalfWidth: Math.max(6, Math.round(8 * scale)),
          diamondTopOffset: Math.max(34, Math.round(42 * scale)),
          diamondCenterOffset: Math.max(42, Math.round(50 * scale)),
          diamondBottomOffset: Math.max(50, Math.round(58 * scale)),
        };
      };

      const UmlClassBox = ({ x, y, width, label, active, metrics }) => (
        <g>
          <rect
            x={x}
            y={y}
            width={width}
            height={metrics.nodeHeight}
            rx="10"
            fill={active ? "#1d4ed8" : "#334155"}
            stroke={active ? "#93c5fd" : "#64748b"}
            strokeWidth={active ? 2.5 : 1.5}
          />
          <text
            x={x + width / 2}
            y={y + metrics.nodeHeight / 2}
            textAnchor="middle"
            dominantBaseline="middle"
            fontSize={metrics.fontSize}
            fontWeight="700"
            fill="#e2e8f0"
          >
            {label}
          </text>
        </g>
      );

      const buildCompositionLayout = (diagramModel, metrics) => {
        const groups = diagramModel.compositionGroups || [];
        if (groups.length === 0) {
          return { width: 0, height: 54, groups: [] };
        }

        let cursorY = 0;
        let maxWidth = 0;

        const laidOutGroups = groups.map((group) => {
          const ownerWidth = getDiagramNodeWidth(group.owner, metrics);
          const childWidths = group.edges.map((edge) =>
            getDiagramNodeWidth(edge.target, metrics),
          );
          const childrenRowWidth =
            childWidths.reduce((sum, width) => sum + width, 0) +
            Math.max(0, childWidths.length - 1) * metrics.nodeGap;
          const groupWidth = Math.max(ownerWidth, childrenRowWidth);
          const childY = cursorY + metrics.compositionChildOffset;
          const groupHeight = metrics.compositionGroupHeight;
          const ownerX = (groupWidth - ownerWidth) / 2;
          const childStartX = (groupWidth - childrenRowWidth) / 2;
          let childCursorX = childStartX;

          const children = group.edges.map((edge, index) => {
            const childWidth = childWidths[index];
            const child = {
              ...edge,
              x: childCursorX,
              y: childY,
              width: childWidth,
            };
            childCursorX += childWidth + metrics.nodeGap;
            return child;
          });

          cursorY += groupHeight + metrics.groupGap;
          maxWidth = Math.max(maxWidth, groupWidth);

          return {
            owner: group.owner,
            x: ownerX,
            y: cursorY - groupHeight - metrics.groupGap,
            width: ownerWidth,
            children,
            groupWidth,
          };
        });

        return {
          width: maxWidth,
          height: Math.max(
            laidOutGroups.length * metrics.compositionMinHeight,
            cursorY - metrics.groupGap,
          ),
          groups: laidOutGroups,
        };
      };

      const buildInheritanceLayout = (diagramModel, metrics) => {
        const buildTree = (name) => ({
          name,
          children: (diagramModel.childMap?.[name] || []).map(buildTree),
        });

        const measureTree = (node) => {
          const nodeWidth = getDiagramNodeWidth(node.name, metrics);
          const childLayouts = node.children.map(measureTree);
          const childWidth =
            childLayouts.reduce((sum, child) => sum + child.subtreeWidth, 0) +
            Math.max(0, childLayouts.length - 1) * metrics.nodeGap;

          return {
            ...node,
            nodeWidth,
            subtreeWidth: Math.max(nodeWidth, childWidth),
            depth:
              childLayouts.length > 0
                ? 1 + Math.max(...childLayouts.map((child) => child.depth))
                : 1,
            childLayouts,
          };
        };

        const placeTree = (layout, startX, startY) => {
          const nodeX = startX + (layout.subtreeWidth - layout.nodeWidth) / 2;
          const node = {
            name: layout.name,
            x: nodeX,
            y: startY,
            width: layout.nodeWidth,
            children: [],
          };

          const totalChildrenWidth =
            layout.childLayouts.reduce(
              (sum, child) => sum + child.subtreeWidth,
              0,
            ) +
            Math.max(0, layout.childLayouts.length - 1) * metrics.nodeGap;
          let childCursorX =
            startX + (layout.subtreeWidth - totalChildrenWidth) / 2;

          node.children = layout.childLayouts.map((childLayout) => {
            const child = placeTree(
              childLayout,
              childCursorX,
              startY + metrics.inheritanceLevelGap,
            );
            childCursorX += childLayout.subtreeWidth + metrics.nodeGap;
            return child;
          });

          return node;
        };

        const measuredRoots = (diagramModel.inheritanceRoots || [])
          .map(buildTree)
          .map(measureTree);

        if (measuredRoots.length === 0) {
          return { width: 0, height: 54, roots: [] };
        }

        const forestWidth =
          measuredRoots.reduce((sum, root) => sum + root.subtreeWidth, 0) +
          Math.max(0, measuredRoots.length - 1) * metrics.rootGap;
        const width = Math.max(forestWidth, 1);

        let cursorX = (width - forestWidth) / 2;
        const roots = measuredRoots.map((rootLayout) => {
          const placed = placeTree(rootLayout, cursorX, 0);
          cursorX += rootLayout.subtreeWidth + metrics.rootGap;
          return placed;
        });

        return {
          width,
          height:
            Math.max(
              0,
              Math.max(...measuredRoots.map((root) => root.depth)) - 1,
            ) *
              metrics.inheritanceLevelGap +
            metrics.nodeHeight,
          roots,
        };
      };

      const UmlDiagram = ({ currentClass, diagramModel, fontSize }) => {
        const metrics = getUmlMetrics(fontSize);
        const compositionLayout = buildCompositionLayout(diagramModel, metrics);
        const inheritanceLayout = buildInheritanceLayout(diagramModel, metrics);
        const width = Math.max(
          compositionLayout.width,
          inheritanceLayout.width,
          1,
        );
        const compositionYOffset = metrics.topPadding;
        const inheritanceYOffset =
          compositionYOffset + compositionLayout.height + metrics.sectionGap;
        const height =
          inheritanceYOffset + inheritanceLayout.height + metrics.footerPadding;

        const renderInheritanceNode = (node) => {
          const nodeCenterX = node.x + node.width / 2;
          const childrenRowY = node.y + metrics.inheritanceLevelGap;
          const busY = childrenRowY - metrics.busOffset;

          return (
            <g key={`${node.name}-${node.x}-${node.y}`}>
              {node.children.length > 0 && (
                <>
                  <line
                    x1={nodeCenterX}
                    y1={node.y + metrics.nodeHeight}
                    x2={nodeCenterX}
                    y2={busY}
                    stroke="#94a3b8"
                    strokeWidth="2"
                    markerStart="url(#uml-generalization)"
                  />
                  {node.children.length > 1 && (
                    <line
                      x1={node.children[0].x + node.children[0].width / 2}
                      y1={busY}
                      x2={
                        node.children[node.children.length - 1].x +
                        node.children[node.children.length - 1].width / 2
                      }
                      y2={busY}
                      stroke="#475569"
                      strokeWidth="2"
                    />
                  )}
                  {node.children.map((child) => (
                    <line
                      key={`${node.name}-${child.name}-link`}
                      x1={child.x + child.width / 2}
                      y1={busY}
                      x2={child.x + child.width / 2}
                      y2={child.y}
                      stroke="#475569"
                      strokeWidth="2"
                    />
                  ))}
                </>
              )}
              <UmlClassBox
                x={node.x}
                y={node.y}
                width={node.width}
                label={node.name}
                active={isClassActiveInDiagram(
                  diagramModel,
                  currentClass,
                  node.name,
                )}
                metrics={metrics}
              />
              {node.children.map(renderInheritanceNode)}
            </g>
          );
        };

        if (!diagramModel.classes?.length) {
          return (
            <div className="flex h-full items-center justify-center rounded-xl border border-dashed border-slate-600 bg-slate-900/40 p-6 text-center text-sm text-slate-400">
              No class definitions found in the current editor yet.
            </div>
          );
        }

        return (
          <svg
            width={width}
            height={height}
            viewBox={`0 0 ${width} ${height}`}
            className="mx-auto block max-w-none"
            role="img"
            aria-label="Live UML class diagram"
          >
            <defs>
              <marker
                id="uml-generalization"
                markerWidth="12"
                markerHeight="12"
                refX="10"
                refY="6"
                orient="auto-start-reverse"
                markerUnits="strokeWidth"
              >
                <path
                  d="M0,0 L12,6 L0,12 z"
                  fill="#0f172a"
                  stroke="#94a3b8"
                  strokeWidth="1.2"
                />
              </marker>
            </defs>

            <text
              x={width / 2}
              y={metrics.sectionLabelY}
              textAnchor="middle"
              fontSize={metrics.sectionLabelFontSize}
              fill="#94a3b8"
            >
              Composition
            </text>

            {compositionLayout.groups.length > 0 ? (
              compositionLayout.groups.map((group) => {
                const ownerCenterX =
                  (width - group.groupWidth) / 2 + group.x + group.width / 2;
                const ownerY = compositionYOffset + group.y;
                const busY =
                  compositionYOffset + group.children[0].y - metrics.busOffset;
                const childrenStartX = (width - group.groupWidth) / 2;

                return (
                  <g key={`composition-${group.owner}`}>
                    <polygon
                      points={`${ownerCenterX},${ownerY + metrics.diamondTopOffset} ${ownerCenterX + metrics.diamondHalfWidth},${ownerY + metrics.diamondCenterOffset} ${ownerCenterX},${ownerY + metrics.diamondBottomOffset} ${ownerCenterX - metrics.diamondHalfWidth},${ownerY + metrics.diamondCenterOffset}`}
                      fill="#94a3b8"
                      stroke="#94a3b8"
                      strokeWidth="1.5"
                    />
                    <line
                      x1={ownerCenterX}
                      y1={ownerY + metrics.diamondBottomOffset}
                      x2={ownerCenterX}
                      y2={busY}
                      stroke="#94a3b8"
                      strokeWidth="2"
                    />
                    {group.children.length > 1 && (
                      <line
                        x1={
                          childrenStartX +
                          group.children[0].x +
                          group.children[0].width / 2
                        }
                        y1={busY}
                        x2={
                          childrenStartX +
                          group.children[group.children.length - 1].x +
                          group.children[group.children.length - 1].width / 2
                        }
                        y2={busY}
                        stroke="#475569"
                        strokeWidth="2"
                      />
                    )}
                    <UmlClassBox
                      x={(width - group.groupWidth) / 2 + group.x}
                      y={ownerY}
                      width={group.width}
                      label={group.owner}
                      active={isClassActiveInDiagram(
                        diagramModel,
                        currentClass,
                        group.owner,
                      )}
                      metrics={metrics}
                    />
                    {group.children.map((child) => (
                      <g key={`${group.owner}-${child.attr}-${child.target}`}>
                        <line
                          x1={childrenStartX + child.x + child.width / 2}
                          y1={busY}
                          x2={childrenStartX + child.x + child.width / 2}
                          y2={compositionYOffset + child.y}
                          stroke="#475569"
                          strokeWidth="2"
                        />
                        <UmlClassBox
                          x={childrenStartX + child.x}
                          y={compositionYOffset + child.y}
                          width={child.width}
                          label={child.target}
                          active={isClassActiveInDiagram(
                            diagramModel,
                            currentClass,
                            child.target,
                          )}
                          metrics={metrics}
                        />
                      </g>
                    ))}
                  </g>
                );
              })
            ) : (
              <text
                x={width / 2}
                y={metrics.compositionEmptyY}
                textAnchor="middle"
                fontSize={metrics.emptyMessageFontSize}
                fill="#64748b"
              >
                No composition relationships inferred from the current code.
              </text>
            )}

            <text
              x={width / 2}
              y={inheritanceYOffset - metrics.inheritanceLabelOffset}
              textAnchor="middle"
              fontSize={metrics.sectionLabelFontSize}
              fill="#94a3b8"
            >
              Inheritance
            </text>

            <g transform={`translate(0 ${inheritanceYOffset})`}>
              {inheritanceLayout.roots.map(renderInheritanceNode)}
            </g>
          </svg>
        );
      };

      const HierarchyNode = ({ x, y, width, label, active, metrics }) => (
        <g>
          <rect
            x={x}
            y={y}
            width={width}
            height={metrics.nodeHeight}
            rx="10"
            fill={active ? "#065f46" : "#334155"}
            stroke={active ? "#34d399" : "#64748b"}
            strokeWidth={active ? 2.5 : 1.5}
          />
          <text
            x={x + width / 2}
            y={y + metrics.nodeHeight / 2}
            textAnchor="middle"
            dominantBaseline="middle"
            fontSize={metrics.fontSize}
            fontWeight="700"
            fill="#e2e8f0"
          >
            {label}
          </text>
        </g>
      );

      const buildCallHierarchyLayout = (hierarchyModel, fontSize) => {
        const { functionDefs, orderedNames, roots } = hierarchyModel;
        const metrics = getHierarchyMetrics(fontSize);

        const buildTree = (name, visited = new Set()) => {
          if (visited.has(name)) return { name, children: [] };
          const nextVisited = new Set(visited);
          nextVisited.add(name);
          const fn = functionDefs[name];
          if (!fn) return { name, children: [] };
          return {
            name,
            children: fn.calls
              .filter((c) => functionDefs[c])
              .map((c) => buildTree(c, nextVisited)),
          };
        };

        const measureTree = (node) => {
          const nodeWidth = getDiagramNodeWidth(node.name, metrics);
          const childLayouts = node.children.map(measureTree);
          const childWidth =
            childLayouts.reduce((sum, child) => sum + child.subtreeWidth, 0) +
            Math.max(0, childLayouts.length - 1) * metrics.nodeGap;
          return {
            ...node,
            nodeWidth,
            subtreeWidth: Math.max(nodeWidth, childWidth),
            depth:
              childLayouts.length > 0
                ? 1 + Math.max(...childLayouts.map((c) => c.depth))
                : 1,
            childLayouts,
          };
        };

        const placeTree = (layout, startX, startY) => {
          const nodeX = startX + (layout.subtreeWidth - layout.nodeWidth) / 2;
          const node = {
            name: layout.name,
            x: nodeX,
            y: startY,
            width: layout.nodeWidth,
            children: [],
          };

          const totalChildWidth =
            layout.childLayouts.reduce(
              (sum, child) => sum + child.subtreeWidth,
              0,
            ) +
            Math.max(0, layout.childLayouts.length - 1) * metrics.nodeGap;
          let childCursorX =
            startX + (layout.subtreeWidth - totalChildWidth) / 2;

          node.children = layout.childLayouts.map((childLayout) => {
            const child = placeTree(
              childLayout,
              childCursorX,
              startY + metrics.levelGap,
            );
            childCursorX += childLayout.subtreeWidth + metrics.nodeGap;
            return child;
          });

          return node;
        };

        const treesToLayout =
          roots.length > 0 ? roots : orderedNames.slice(0, 1);
        if (treesToLayout.length === 0) {
          return { width: 0, height: 54, roots: [] };
        }

        const measuredRoots = treesToLayout.map((name) =>
          measureTree(buildTree(name)),
        );

        const forestWidth =
          measuredRoots.reduce((sum, root) => sum + root.subtreeWidth, 0) +
          Math.max(0, measuredRoots.length - 1) * metrics.rootGap;
        const width = Math.max(forestWidth, 1);

        let cursorX = (width - forestWidth) / 2;
        const placedRoots = measuredRoots.map((rootLayout) => {
          const placed = placeTree(rootLayout, cursorX, 0);
          cursorX += rootLayout.subtreeWidth + metrics.rootGap;
          return placed;
        });

        const maxDepth = Math.max(...measuredRoots.map((r) => r.depth));

        return {
          width,
          height:
            Math.max(0, maxDepth - 1) * metrics.levelGap + metrics.nodeHeight,
          roots: placedRoots,
          metrics,
        };
      };

      const HierarchyChart = ({ currentFunc, hierarchyModel, fontSize }) => {
        const layout = buildCallHierarchyLayout(hierarchyModel, fontSize);
        const { metrics } = layout;

        const renderNode = (node) => {
          const active = node.name === currentFunc;
          const nodeCenterX = node.x + node.width / 2;
          const busY = node.y + metrics.levelGap - metrics.busOffset;

          return (
            <g key={`${node.name}-${node.x}-${node.y}`}>
              {node.children.length > 0 && (
                <>
                  <line
                    x1={nodeCenterX}
                    y1={node.y + metrics.nodeHeight}
                    x2={nodeCenterX}
                    y2={busY}
                    stroke="#94a3b8"
                    strokeWidth="2"
                  />
                  {node.children.length > 1 && (
                    <line
                      x1={node.children[0].x + node.children[0].width / 2}
                      y1={busY}
                      x2={
                        node.children[node.children.length - 1].x +
                        node.children[node.children.length - 1].width / 2
                      }
                      y2={busY}
                      stroke="#475569"
                      strokeWidth="2"
                    />
                  )}
                  {node.children.map((child) => (
                    <line
                      key={`${node.name}-${child.name}-link`}
                      x1={child.x + child.width / 2}
                      y1={busY}
                      x2={child.x + child.width / 2}
                      y2={child.y}
                      stroke="#475569"
                      strokeWidth="2"
                    />
                  ))}
                </>
              )}
              <HierarchyNode
                x={node.x}
                y={node.y}
                width={node.width}
                label={node.name}
                active={active}
                metrics={metrics}
              />
              {node.children.map(renderNode)}
            </g>
          );
        };

        if (!hierarchyModel.orderedNames?.length) {
          return (
            <div className="flex h-full items-center justify-center rounded-xl border border-dashed border-slate-600 bg-slate-900/40 p-6 text-center text-sm text-slate-400">
              No function definitions found in the current editor yet.
            </div>
          );
        }

        return (
          <svg
            width={layout.width}
            height={layout.height + metrics.busOffset}
            viewBox={`0 0 ${layout.width} ${layout.height + metrics.busOffset}`}
            className="mx-auto block max-w-none"
            role="img"
            aria-label="Live function call hierarchy chart"
          >
            {layout.roots.map(renderNode)}
          </svg>
        );
      };

      const OUTLINE_KIND_LABELS = {
        class: "Class",
        method: "Method",
        function: "Function",
        attribute: "Attribute",
        global: "Global",
        constant: "Constant",
        local: "Local",
        parameter: "Parameter",
      };

      const OUTLINE_KIND_MARKS = {
        class: "C",
        method: "M",
        function: "F",
        attribute: "A",
        global: "G",
        constant: "K",
        local: "L",
        parameter: "P",
      };

      const OutlinePanel = ({
        outlineModel,
        expandedIds,
        setExpandedIds,
        onJumpToLine,
        currentLine,
      }) => {
        const expandableIds = getExpandableOutlineIds(outlineModel);
        const anyExpanded = expandedIds.size > 0;

        const toggleNode = (nodeId) => {
          setExpandedIds((current) => {
            const next = new Set(current);
            if (next.has(nodeId)) next.delete(nodeId);
            else next.add(nodeId);
            return next;
          });
        };

        const renderNode = (node, depth = 0) => {
          const hasChildren = node.children?.length > 0;
          const isExpanded = expandedIds.has(node.id);
          const isCurrent =
            currentLine > 0 &&
            node.line <= currentLine &&
            (!node.endLine || currentLine <= node.endLine);

          return (
            <div key={node.id}>
              <div
                className={`flex min-w-0 items-center gap-1 rounded px-2 py-1 text-sm transition-colors ${
                  isCurrent
                    ? "bg-sky-700/60 text-white"
                    : "text-slate-300 hover:bg-slate-700/60"
                }`}
                style={{ paddingLeft: `${8 + depth * 16}px` }}
              >
                <button
                  type="button"
                  onClick={() => hasChildren && toggleNode(node.id)}
                  disabled={!hasChildren}
                  className="h-5 w-5 shrink-0 text-slate-400 disabled:text-transparent"
                  title={hasChildren ? "Expand or collapse" : ""}
                >
                  {hasChildren ? (isExpanded ? "▾" : "▸") : "•"}
                </button>
                <button
                  type="button"
                  onClick={() => onJumpToLine(node.line)}
                  className="flex min-w-0 flex-1 items-center gap-2 text-left"
                  title={`${OUTLINE_KIND_LABELS[node.kind] || "Symbol"}: ${node.name}`}
                >
                  <span className="inline-flex h-4 w-4 shrink-0 items-center justify-center rounded border border-slate-600 text-[10px] font-bold text-slate-300">
                    {OUTLINE_KIND_MARKS[node.kind] || "S"}
                  </span>
                  <span className="truncate">{node.name}</span>
                  <span className="ml-auto shrink-0 text-[11px] text-slate-500">
                    {node.line}
                  </span>
                </button>
              </div>
              {hasChildren && isExpanded && (
                <div>
                  {node.children.map((child) => renderNode(child, depth + 1))}
                </div>
              )}
            </div>
          );
        };

        if (!outlineModel.roots.length) {
          return (
            <div className="flex h-full items-center justify-center rounded-xl border border-dashed border-slate-600 bg-slate-900/40 p-6 text-center text-sm text-slate-400">
              No classes, functions, or variables found in the current editor yet.
            </div>
          );
        }

        return (
          <div className="flex h-full min-h-[280px] flex-col rounded-lg border border-slate-700 bg-slate-900/50">
            <div className="flex items-center justify-between border-b border-slate-700 px-3 py-2">
              <div className="text-[11px] uppercase tracking-wider text-slate-500">
                {countOutlineNodes(outlineModel)} symbols
              </div>
              <button
                type="button"
                onClick={() =>
                  setExpandedIds(
                    anyExpanded ? new Set() : new Set(expandableIds),
                  )
                }
                className="rounded border border-slate-600 px-2 py-1 text-[11px] font-semibold text-slate-300 transition-colors hover:border-sky-400"
              >
                {anyExpanded ? "Collapse All" : "Expand All"}
              </button>
            </div>
            <div className="min-h-0 flex-1 overflow-y-auto p-2">
              {outlineModel.roots.map((node) => renderNode(node))}
            </div>
          </div>
        );
      };

      // ─── Inspector helpers (shared with A Level) ─────────────────────────────

      const getInspectorChildren = (node) => {
        if (!node) return [];
        if (node.kind === "object") return node.attrs || [];
        if (node.kind === "scope" || node.kind === "mapping")
          return node.entries || [];
        if (node.kind === "sequence") return node.items || [];
        return [];
      };

      const INSPECTOR_RUNTIME_NAMES = new Set([
        "MAX_ITEMS",
        "MAX_STRING",
        "code_obj",
        "control_blocks",
        "current_breakpoints",
        "frame_depths",
        "pending_action",
        "source_lines",
        "tree",
        "user_code_str",
      ]);

      const isRuntimeInspectorEntry = (entry) => {
        const label = String(entry?.label || "").replace(/^['"]|['"]$/g, "");
        return (
          INSPECTOR_RUNTIME_NAMES.has(label) ||
          label.startsWith("js_") ||
          label.startsWith("pyodide")
        );
      };

      const filterInspectorChildren = (children, showRuntimeValues) =>
        showRuntimeValues
          ? children
          : children.filter((entry) => !isRuntimeInspectorEntry(entry));

      const getInspectorNodeAtPath = (
        rootNode,
        path,
        showRuntimeValues = false,
      ) => {
        let currentNode = rootNode;
        for (const segment of path) {
          const children = filterInspectorChildren(
            getInspectorChildren(currentNode),
            showRuntimeValues,
          );
          const nextChild = children[segment.index];
          if (!nextChild) return currentNode;
          currentNode = nextChild.value;
        }
        return currentNode;
      };

      const buildInspectorBreadcrumbs = (
        root,
        path,
        showRuntimeValues = false,
      ) => {
        if (!root || !root.node) return [];
        const breadcrumbs = [{ label: root.label, path: [] }];
        let currentNode = root.node;
        path.forEach((segment, depth) => {
          const children = filterInspectorChildren(
            getInspectorChildren(currentNode),
            showRuntimeValues,
          );
          const child = children[segment.index];
          if (!child) return;
          const nextPath = path.slice(0, depth + 1);
          breadcrumbs.push({
            label: child.label,
            path: nextPath,
          });
          currentNode = child.value;
        });
        return breadcrumbs;
      };

      const isInspectorCompound = (node) =>
        !!node &&
        ["object", "scope", "mapping", "sequence"].includes(node.kind);

      const formatInspectorValue = (node) => {
        if (!node) return "Unavailable";
        if (node.kind === "primitive") return node.summary ?? String(node.value);
        if (node.kind === "reference") return node.summary ?? node.type;
        if (node.kind === "object")
          return `${node.type} • ${node.attrs?.length ?? 0} attrs`;
        if (node.kind === "sequence")
          return `${node.type} • ${node.length ?? node.items?.length ?? 0} items`;
        if (node.kind === "mapping")
          return `dict • ${node.length ?? node.entries?.length ?? 0} entries`;
        if (node.kind === "scope")
          return `${node.type} scope • ${node.entries?.length ?? 0} values`;
        return node.summary ?? node.type ?? "Value";
      };

      const formatInspectorPrimitive = (node) => {
        if (!node) return "";
        if (node.kind !== "primitive") return formatInspectorValue(node);
        if (typeof node.value === "string") return node.value;
        return node.summary ?? String(node.value);
      };

      const InspectorPane = ({
        title,
        root,
        path,
        setPath,
        emptyMessage,
        unavailableMessage = "",
        showRuntimeValues = false,
      }) => {
        if (unavailableMessage) {
          return (
            <div className="flex min-h-0 flex-1 flex-col rounded-lg border border-slate-700 bg-slate-900/40">
              <div className="border-b border-slate-700 px-4 py-3">
                <div className="text-[11px] font-bold uppercase tracking-wider text-slate-400">
                  {title}
                </div>
              </div>
              <div className="flex flex-1 items-center justify-center p-6 text-center text-sm text-slate-500">
                {unavailableMessage}
              </div>
            </div>
          );
        }

        if (!root?.node) {
          return (
            <div className="flex min-h-0 flex-1 flex-col rounded-lg border border-slate-700 bg-slate-900/40">
              <div className="border-b border-slate-700 px-4 py-3">
                <div className="text-[11px] font-bold uppercase tracking-wider text-slate-400">
                  {title}
                </div>
              </div>
              <div className="flex flex-1 items-center justify-center p-6 text-center text-sm text-slate-500">
                {emptyMessage}
              </div>
            </div>
          );
        }

        const activeNode = getInspectorNodeAtPath(
          root.node,
          path,
          showRuntimeValues,
        );
        const children = filterInspectorChildren(
          getInspectorChildren(activeNode),
          showRuntimeValues,
        );
        const breadcrumbs = buildInspectorBreadcrumbs(
          root,
          path,
          showRuntimeValues,
        );

        return (
          <div className="flex min-h-0 flex-1 flex-col rounded-lg border border-slate-700 bg-slate-900/60">
            <div className="border-b border-slate-700 px-3 py-2">
              <div className="text-[11px] font-bold uppercase tracking-wider text-slate-400">
                {title}
              </div>
              <div className="mt-1 text-xs text-slate-500">
                {root.label}
              </div>
            </div>

            <div className="flex min-h-0 flex-1 flex-col gap-3 overflow-y-auto p-3">
              <div className="flex flex-wrap items-center gap-2 text-xs">
                {breadcrumbs.map((crumb, index) => (
                  <React.Fragment key={`${crumb.label}-${index}`}>
                    {index > 0 && <span className="text-slate-500">/</span>}
                    <button
                      onClick={() => setPath(crumb.path)}
                      className={`rounded border px-2 py-1 ${
                        index === breadcrumbs.length - 1
                          ? "border-sky-500 bg-sky-900/40 text-sky-100"
                          : "border-slate-600 bg-slate-900/60 text-slate-300 hover:border-sky-500"
                      }`}
                    >
                      {crumb.label}
                    </button>
                  </React.Fragment>
                ))}
                {path.length > 0 && (
                  <button
                    onClick={() => setPath([])}
                    className="ml-auto rounded border border-slate-600 px-2 py-1 text-slate-300 hover:border-sky-500"
                  >
                    Reset Focus
                  </button>
                )}
              </div>

              <div className="rounded-lg border border-slate-700 bg-black/20 p-3">
                <div className="text-[11px] uppercase tracking-wider text-slate-500">
                  {activeNode?.type || "Value"}
                </div>
                <div className="mt-2 flex flex-wrap items-center justify-between gap-2">
                  <h3 className="text-lg font-bold text-white">
                    {formatInspectorValue(activeNode)}
                  </h3>
                  {isInspectorCompound(activeNode) && (
                    <span className="text-xs text-slate-400">
                      {children.length} visible children
                    </span>
                  )}
                </div>
                {activeNode?.truncated && (
                  <div className="mt-3 text-xs text-amber-300">
                    Showing the first 120 entries in this collection.
                  </div>
                )}
                {!isInspectorCompound(activeNode) && (
                  <pre className="mt-2 whitespace-pre-wrap rounded bg-black/40 p-2 text-xs text-emerald-300">
                    {formatInspectorPrimitive(activeNode)}
                  </pre>
                )}
              </div>

              {isInspectorCompound(activeNode) ? (
                children.length > 0 ? (
                  <div className="grid grid-cols-1 gap-2 xl:grid-cols-2">
                    {children.map((child, index) => {
                      const childNode = child.value;
                      const canOpen = isInspectorCompound(childNode);
                      const cardClasses = `rounded-lg border p-2 text-left transition-colors ${
                        canOpen
                          ? "border-slate-600 bg-slate-900/70 hover:border-sky-500 cursor-pointer"
                          : "border-slate-700 bg-slate-900/40"
                      }`;

                      if (canOpen) {
                        return (
                          <button
                            key={`${child.label}-${index}`}
                            onClick={() =>
                              setPath([
                                ...path,
                                { index, label: child.label },
                              ])
                            }
                            className={cardClasses}
                          >
                            <div className="flex items-start justify-between gap-2">
                              <span className="break-all font-semibold text-slate-100">
                                {child.label}
                              </span>
                              <span className="text-[10px] uppercase tracking-wider text-slate-500">
                                {childNode.type}
                              </span>
                            </div>
                            <div className="mt-1 text-xs text-slate-300">
                              {formatInspectorValue(childNode)}
                            </div>
                            <div className="mt-2 text-[11px] text-sky-300">
                              Open
                            </div>
                          </button>
                        );
                      }

                      return (
                        <div
                          key={`${child.label}-${index}`}
                          className={cardClasses}
                        >
                          <div className="flex items-start justify-between gap-2">
                            <span className="break-all font-semibold text-slate-100">
                              {child.label}
                            </span>
                            <span className="text-[10px] uppercase tracking-wider text-slate-500">
                              {childNode?.type || "value"}
                            </span>
                          </div>
                          <div className="mt-1 break-all whitespace-pre-wrap text-xs text-emerald-300">
                            {formatInspectorPrimitive(childNode)}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  <div className="text-sm italic text-slate-500">
                    No inspectable values are available at this scope.
                  </div>
                )
              ) : null}
            </div>
          </div>
        );
      };

      // ─── App component ────────────────────────────────────────────────────────

      const App = () => {
        const [codeText, setCodeText] = useState("");
        const [theme, setTheme] = useState(() => getStoredTheme());
        const [noteOverrides, setNoteOverrides] = useState(() =>
          getStoredNoteOverrides(),
        );
        const [codeStatus, setCodeStatus] = useState(
          "No code loaded. Use Load or start typing.",
        );
        const [codeLabel, setCodeLabel] = useState("No code loaded");
        const [codeFileName, setCodeFileName] = useState(DEFAULT_CODE_FILENAME);
        const [isCodeBusy, setIsCodeBusy] = useState(false);
        const [isEditorReady, setIsEditorReady] = useState(false);
        const [editorError, setEditorError] = useState("");
        const [structureModel, setStructureModel] = useState(() =>
          buildPythonStructureModel(""),
        );
        const [diagramModel, setDiagramModel] = useState(() =>
          analyzePythonClasses(""),
        );
        const [hierarchyModel, setHierarchyModel] = useState(() =>
          analyzePythonFunctions(""),
        );
        const [outlineModel, setOutlineModel] = useState(() =>
          analyzePythonOutline(""),
        );
        const [isInsightEditing, setIsInsightEditing] = useState(false);
        const [noteDraft, setNoteDraft] = useState("");
        const [showExportDialog, setShowExportDialog] = useState(false);
        const [currentLine, setCurrentLine] = useState(-1);
        const [currentFunc, setCurrentFunc] = useState("");
        const [currentClass, setCurrentClass] = useState("");
        const [simState, setSimState] = useState(null);

        const [isRunning, setIsRunning] = useState(false);
        const [hasSab, setHasSab] = useState(false);
        const [isCrossOriginIsolated, setIsCrossOriginIsolated] =
          useState(false);
        const [inputRequest, setInputRequest] = useState(null);
        const [inputValue, setInputValue] = useState("");
        const [outputLog, setOutputLog] = useState("");
        const [activeRuntime, setActiveRuntime] = useState("");
        const [mainThreadStatus, setMainThreadStatus] = useState(
          "Main-thread runtime is ready.",
        );
        const [isPygameRunActive, setIsPygameRunActive] = useState(false);
        const [runtimePreference, setRuntimePreference] =
          useState("trace-worker");
        const [visiblePanels, setVisiblePanels] = useState({
          code: true,
          visualizer: true,
          diagram: true,
          insight: true,
        });
        const [diagramFontSize, setDiagramFontSize] = useState(
          DIAGRAM_FONT_DEFAULT,
        );
        const [isPanelMenuOpen, setIsPanelMenuOpen] = useState(false);
        const [isRuntimeMenuOpen, setIsRuntimeMenuOpen] = useState(false);

        const [diagramView, setDiagramView] = useState("hierarchy");
        const [outlineExpandedIds, setOutlineExpandedIds] = useState(
          () => new Set(),
        );
        const [showInterpreterVars, setShowInterpreterVars] = useState(false);
        const [globalsInspectorPath, setGlobalsInspectorPath] = useState([]);
        const [localsInspectorPath, setLocalsInspectorPath] = useState([]);
        const [breakpoints, setBreakpoints] = useState(new Set());
        const breakpointsRef = useRef(new Set());

        const workerRef = useRef(null);
        const sabRef = useRef(null);
        const editorContainerRef = useRef(null);
        const editorRef = useRef(null);
        const monacoRef = useRef(null);
        const editorDecorationsRef = useRef(null);
        const breakpointDecorationsRef = useRef(null);
        const applyingEditorValueRef = useRef(false);
        const outputRef = useRef(null);
        const inputRef = useRef(null);
        const fileInputRef = useRef(null);
        const panelMenuRef = useRef(null);
        const runtimeMenuRef = useRef(null);
        const mainThreadCanvasRef = useRef(null);
        const mainThreadCanvasSnapshotRef = useRef(null);
        const mainThreadCanvasWatcherRef = useRef(0);
        const mainThreadStopRequestedRef = useRef(false);
        const pygameLayoutSnapshotRef = useRef(null);
        const mainThreadRunIdRef = useRef(0);
        const noteDraftRef = useRef("");
        const isInsightEditingRef = useRef(false);
        const activeInsightKeyRef = useRef("");
        const deferredCodeText = useDeferredValue(codeText);
        const hasCode = codeText.trim().length > 0;
        const panelOptions = [
          {
            key: "code",
            label: "Code Trace",
            description: "Editor, breakpoints, and line focus.",
          },
          {
            key: "visualizer",
            label: "Inspectors",
            description: "Fixed globals and current-locals inspectors.",
          },
          {
            key: "diagram",
            label: "Structure / Canvas",
            description: "Function hierarchy, UML view, or pygame canvas.",
          },
          {
            key: "insight",
            label: "Notes + Output",
            description: "Documentation notes and console output.",
          },
        ];

        // Resizable panel state (percentages)
        const [leftWidth, setLeftWidth] = useState(41.67);
        const [rightTopHeight, setRightTopHeight] = useState(50);
        const [bottomLeftWidth, setBottomLeftWidth] = useState(42.86);

        const resizeDragRef = useRef(null);
        const mainContainerRef = useRef(null);
        const rightSideRef = useRef(null);
        const bottomRowRef = useRef(null);

        useEffect(() => {
          const onMouseMove = (e) => {
            if (!resizeDragRef.current) return;
            if (resizeDragRef.current === "col-main" && mainContainerRef.current) {
              const rect = mainContainerRef.current.getBoundingClientRect();
              const pct = ((e.clientX - rect.left) / rect.width) * 100;
              setLeftWidth(Math.max(15, Math.min(75, pct)));
            } else if (
              resizeDragRef.current === "row-right" &&
              rightSideRef.current
            ) {
              const rect = rightSideRef.current.getBoundingClientRect();
              const pct = ((e.clientY - rect.top) / rect.height) * 100;
              setRightTopHeight(Math.max(15, Math.min(85, pct)));
            } else if (
              resizeDragRef.current === "col-bottom" &&
              bottomRowRef.current
            ) {
              const rect = bottomRowRef.current.getBoundingClientRect();
              const pct = ((e.clientX - rect.left) / rect.width) * 100;
              setBottomLeftWidth(Math.max(15, Math.min(85, pct)));
            }
          };
          const onMouseUp = () => {
            resizeDragRef.current = null;
            document.body.style.cursor = "";
            document.body.style.userSelect = "";
          };
          document.addEventListener("mousemove", onMouseMove);
          document.addEventListener("mouseup", onMouseUp);
          return () => {
            document.removeEventListener("mousemove", onMouseMove);
            document.removeEventListener("mouseup", onMouseUp);
          };
        }, []);

        useEffect(() => {
          if (!isPanelMenuOpen && !isRuntimeMenuOpen) return;

          const handlePointerDown = (event) => {
            if (
              panelMenuRef.current?.contains(event.target) ||
              runtimeMenuRef.current?.contains(event.target)
            ) {
              return;
            }
            setIsPanelMenuOpen(false);
            setIsRuntimeMenuOpen(false);
          };

          const handleKeyDown = (event) => {
            if (event.key === "Escape") {
              setIsPanelMenuOpen(false);
              setIsRuntimeMenuOpen(false);
            }
          };

          document.addEventListener("mousedown", handlePointerDown);
          document.addEventListener("keydown", handleKeyDown);
          return () => {
            document.removeEventListener("mousedown", handlePointerDown);
            document.removeEventListener("keydown", handleKeyDown);
          };
        }, [isPanelMenuOpen, isRuntimeMenuOpen]);

        useEffect(() => {
          if (!isRunning) return;
          setIsPanelMenuOpen(false);
          setIsRuntimeMenuOpen(false);
        }, [isRunning]);

        const isPygameLocked = codeUsesPygame(codeText);
        const selectedRuntime = isPygameLocked
          ? "main-thread"
          : runtimePreference;
        const resolvedRuntime = isRunning ? activeRuntime : selectedRuntime;
        const isMainThreadRuntime = resolvedRuntime === "main-thread";
        const isPygameCanvasRuntime =
          isPygameRunActive || (isMainThreadRuntime && isPygameLocked);
        const inspectorRootKey = simState?.Inspector?.key || null;
        const inspectorRoot = simState?.Inspector || null;
        const inspectorViews = inspectorRoot?.views || {};
        const globalsInspectorRoot = inspectorViews.globals
          ? {
              label: inspectorViews.globals.label,
              node: inspectorViews.globals.node,
            }
          : null;
        const localsInspectorRoot = inspectorViews.locals
          ? {
              label: inspectorViews.locals.label,
              node: inspectorViews.locals.node,
            }
          : null;
        const activeInsightKey = currentFunc
          ? getDefinitionKey(currentFunc, currentClass)
          : "";
        const activeInsightDefinition =
          structureModel.definitionByKey[activeInsightKey] || null;
        const activeInsightText = activeInsightDefinition
          ? getDefinitionNote(activeInsightDefinition, noteOverrides)
          : currentFunc
            ? getExplanation(currentFunc, currentClass)
            : "Waiting for execution to enter a definition...";
        const activeInsightHeading =
          activeInsightDefinition?.interface ||
          (currentClass
            ? `${currentClass}.${currentFunc}()`
            : currentFunc
