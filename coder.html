                setMainThreadStatus(String(message ?? "")),
              js_append_main_thread_log: (message) =>
                setOutputLog((prev) => prev + String(message ?? "") + "\n"),
            });

            try {
              if (shouldRunPygame) {
                await runPygameMainThreadCode(pyodide, execGlobals);
              } else {
                await runStandardMainThreadCode(pyodide, execGlobals);
              }
            } finally {
              execGlobals.destroy?.();
            }

            if (runId !== mainThreadRunIdRef.current) return;

            const wasStopRequested =
              mainThreadStopRequestedRef.current === true;
            setOutputLog(
              (prev) =>
                prev +
                (wasStopRequested
                  ? "\n[MAIN-THREAD RUN STOPPED]\n"
                  : "\n[MAIN-THREAD RUN FINISHED]\n"),
            );
            setCodeStatus(
              wasStopRequested
                ? "Main-thread pygame runtime stopped."
                : "Main-thread runtime finished.",
            );
            setMainThreadStatus(
              wasStopRequested
                ? "Main-thread pygame run stopped."
                : "Main-thread run finished.",
            );
            setIsRunning(false);
            setActiveRuntime("");
          } catch (error) {
            if (runId !== mainThreadRunIdRef.current) return;
            const message = error?.message || String(error);
            setOutputLog((prev) => prev + "\n[ERROR] " + message + "\n");
            setCodeStatus("Main-thread runtime failed.");
            setMainThreadStatus(
              "Main-thread run failed. See console output for details.",
            );
            setIsRunning(false);
            setActiveRuntime("");
          } finally {
            mainThreadStopRequestedRef.current = false;
            stopMainThreadCanvasWatcher({
              restoreSnapshot: shouldRunPygame,
            });
            if (shouldRunPygame) {
              restorePygamePresentationMode();
            }
          }
        };

        const sendTraceCommand = (cmd) => {
          if (!sabRef.current) return;
          const { int32 } = sabRef.current;
          if (Atomics.load(int32, 0) === 1) {
            // Write current breakpoints into SAB[500..599] before releasing the worker
            const bpArr = [...breakpointsRef.current];
            int32[500] = bpArr.length;
            bpArr.forEach((ln, i) => { if (i < 99) int32[501 + i] = ln; });
            Atomics.store(int32, 1, cmd);
            Atomics.store(int32, 0, 0);
            Atomics.notify(int32, 0, 1);
          }
        };

        const handleInputSubmit = (submittedValue = inputValue) => {
          if (!sabRef.current) return;
          const { int32, uint8 } = sabRef.current;
          if (Atomics.load(int32, 0) === 2) {
            const encoder = new TextEncoder();
            const bytes = encoder.encode(submittedValue);
            const maxInputBytes = uint8.length - 12;
            const safeBytes = bytes.slice(0, maxInputBytes);
            int32[2] = safeBytes.length;
            uint8.fill(0, 12);
            uint8.set(safeBytes, 12);
            Atomics.store(int32, 0, 0);
            Atomics.notify(int32, 0, 1);
            setInputRequest(null);
            setInputValue("");
          }
        };

        const forceStop = () => {
          if (workerRef.current) {
            workerRef.current.terminate();
            workerRef.current = null;
            sabRef.current = null;
            setCodeStatus("Trace-worker runtime stopped.");
          } else if (activeRuntime === "main-thread") {
            if (isPygameRunActive) {
              mainThreadStopRequestedRef.current = true;
              setOutputLog(
                (prev) =>
                  prev +
                  "\n[INFO] Stop requested for main-thread pygame run.\n",
              );
              setMainThreadStatus("Stopping pygame run...");
              return;
            }
            setOutputLog(
              (prev) =>
                prev +
                "\n[INFO] Force stop is not available in main-thread mode yet.\n",
            );
            setMainThreadStatus(
              "Main-thread mode cannot be forcibly stopped in this phase.",
            );
            return;
          }
          setIsRunning(false);
          setActiveRuntime("");
          setCurrentLine(-1);
          setCurrentFunc("");
          setCurrentClass("");
          setSimState(null);
          setInputRequest(null);
          setInputValue("");
        };

        // ── Render ───────────────────────────────────────────────────────────────
        return (
          <div className="h-screen w-screen flex flex-col overflow-hidden text-sm">
            {/* Header */}
            <div className="bg-slate-800 border-b border-slate-700 flex justify-between items-center px-6 py-3 shadow-md z-10">
              <div className="flex items-center gap-3">
                <a href="/" className="text-slate-400 hover:text-white text-xs font-semibold border border-slate-600 rounded px-2 py-1 mr-1 hover:border-slate-400 transition-colors">← Home</a>
                <svg
                  className="w-8 h-8 text-emerald-400"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    strokeWidth="2"
                    d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"
                  ></path>
                </svg>
                <h1 className="text-xl font-bold tracking-wider">
                  General Python Tracer
                </h1>
              </div>

              <div className="flex items-center gap-3">
                <PanelVisibilityMenu
                  menuRef={panelMenuRef}
                  isOpen={isPanelMenuOpen}
                  onToggleOpen={() => {
                    setIsRuntimeMenuOpen(false);
                    setIsPanelMenuOpen((current) => !current);
                  }}
                  panelOptions={panelOptions}
                  visiblePanels={visiblePanels}
                  onTogglePanel={togglePanelVisibility}
                  buttonHoverClass="hover:border-emerald-400"
                  checkboxAccent="#34d399"
                  disabled={isPygameRunActive}
                />
                <RuntimeSettingsMenu
                  menuRef={runtimeMenuRef}
                  isOpen={isRuntimeMenuOpen}
                  onToggleOpen={() => {
                    setIsPanelMenuOpen(false);
                    setIsRuntimeMenuOpen((current) => !current);
                  }}
                  runtimePreference={runtimePreference}
                  selectedRuntime={selectedRuntime}
                  onSelectRuntime={(runtimeKey) => {
                    setRuntimePreference(runtimeKey);
                    setIsRuntimeMenuOpen(false);
                  }}
                  isPygameLocked={isPygameLocked}
                  hasSab={hasSab}
                  disabled={isRunning}
                />
                <ThemeToggleButton
                  theme={theme}
                  onToggle={toggleTheme}
                />
                {!isRunning ? (
                  <>
                    {selectedRuntime === "trace-worker" && (
                      <button
                        onClick={startTraceWorker}
                        disabled={!hasCode || isCodeBusy || !hasSab}
                        className="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2 rounded font-semibold transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                      >
                        Trace Run
                      </button>
                    )}
                    <button
                      onClick={() => void startMainThreadRun()}
                      disabled={!hasCode || isCodeBusy}
                      className="bg-sky-600 hover:bg-sky-500 text-white px-5 py-2 rounded font-semibold transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                      Run
                    </button>
                  </>
                ) : activeRuntime === "trace-worker" ? (
                  <>
                    <button
                      onClick={() => sendTraceCommand(TRACE_CMD_STEP_INTO)}
                      disabled={inputRequest !== null}
                      className="bg-emerald-700 hover:bg-emerald-600 text-white px-5 py-2 rounded font-semibold transition-colors flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                      <svg
                        className="w-4 h-4"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                      >
                        <path
                          strokeLinecap="round"
                          strokeLinejoin="round"
                          strokeWidth="2"
                          d="M13 5l7 7-7 7M5 5l7 7-7 7"
                        ></path>
                      </svg>
                      Step Into
                    </button>
                    <button
                      onClick={() => sendTraceCommand(TRACE_CMD_STEP_OVER)}
                      disabled={inputRequest !== null}
                      className="bg-teal-700 hover:bg-teal-600 text-white px-5 py-2 rounded font-semibold transition-colors flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                      <svg
                        className="w-4 h-4"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                      >
                        <path
                          strokeLinecap="round"
                          strokeLinejoin="round"
                          strokeWidth="2"
                          d="M11 19l-7-7 7-7m8 14l-7-7 7-7"
                        ></path>
                      </svg>
                      Step Over
                    </button>
                    <button
                      onClick={() =>
                        sendTraceCommand(TRACE_CMD_STEP_OUT_BLOCK)
                      }
                      disabled={inputRequest !== null}
                      className="bg-cyan-700 hover:bg-cyan-600 text-white px-5 py-2 rounded font-semibold transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                      Step Out Block
                    </button>
                    <button
                      onClick={() => sendTraceCommand(TRACE_CMD_CONTINUE)}
                      disabled={inputRequest !== null}
                      className="bg-violet-600 hover:bg-violet-500 text-white px-5 py-2 rounded font-semibold transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                      Continue
                    </button>
                    <button
                      onClick={forceStop}
                      className="bg-red-600 hover:bg-red-500 text-white px-5 py-2 rounded font-semibold transition-colors"
                    >
                      Stop
                    </button>
                  </>
                ) : (
                  <div className="flex items-center overflow-hidden rounded border border-amber-500/70 bg-amber-900/30 text-sm font-semibold text-amber-100">
                    <div className="px-4 py-2">
                      Main-thread execution running
                    </div>
                    <button
                      type="button"
                      onClick={forceStop}
                      className="self-stretch border-l border-amber-500/70 bg-red-700 px-3 text-xs font-bold uppercase tracking-wider text-white transition-colors hover:bg-red-600"
                    >
                      Stop
                    </button>
                  </div>
                )}
              </div>
            </div>

            {!hasSab && selectedRuntime === "trace-worker" && (
              <div className="m-4 rounded border border-red-500 bg-red-900/50 p-4 text-red-200">
                <div className="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
                  <div className="min-w-0">
                    <strong>Trace-worker Warning:</strong> Step tracing requires
                    Cross-Origin Isolation plus <code>SharedArrayBuffer</code>.
                    In this page, <code>window.crossOriginIsolated</code> is{" "}
                    <code>{String(isCrossOriginIsolated)}</code>. Run the repo
                    with <code>npm start</code> or <code>node server.mjs</code>,
                    then open <code>http://localhost:3000/coder</code>.
                    <div className="mt-2 text-sm text-red-100">
                      You can switch to main-thread execution instead. That uses

                      live inspection are currently disabled there.
                    </div>
                  </div>
                  <button
                    type="button"
                    onClick={() => {
                      setRuntimePreference("main-thread");
                      setIsRuntimeMenuOpen(false);
                    }}
                    className="shrink-0 rounded border border-amber-400 bg-amber-500/15 px-4 py-2 text-sm font-semibold text-amber-100 transition-colors hover:bg-amber-500/25"
                  >
                    Use Main Thread
                  </button>
                </div>
              </div>
            )}

            {isPygameRunActive && (
              <div className="flex-shrink-0 border-b border-sky-700 bg-sky-950/80 px-5 py-2 text-sm text-sky-100 shadow-md">
                pygame is running in the main page thread. Debugging and live
                inspection are disabled while it runs. Click inside the canvas
                panel to focus keyboard controls.
              </div>
            )}

            {/* Input Bar — non-modal so the inspector remains usable */}
            {inputRequest !== null && (
              <div className="flex-shrink-0 bg-slate-800 border-b border-slate-600 border-l-4 border-l-amber-400 px-5 py-2.5 flex items-center gap-4 shadow-md z-10">
                <span className="flex-shrink-0 text-xs font-bold uppercase tracking-widest text-amber-400">
                  Input
                </span>
                <span className="flex-shrink-0 text-slate-300 text-sm truncate max-w-xs" title={inputRequest.prompt || ""}>
                  {inputRequest.prompt || "Python is waiting for input..."}
                </span>
                <input
                  key={inputRequest.id}
                  ref={inputRef}
                  type="text"
                  value={inputValue}
                  className="flex-1 min-w-0 bg-slate-900 border border-slate-600 rounded px-3 py-1.5 text-white text-sm focus:outline-none focus:ring-1 focus:ring-amber-400 focus:border-amber-400"
                  placeholder="Type your response..."
                  onChange={(e) => setInputValue(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === "Enter") handleInputSubmit();
                  }}
                />
                <button
                  onClick={() => handleInputSubmit()}
                  className="flex-shrink-0 bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-1.5 rounded font-semibold text-sm transition-colors"
                >
                  Submit
                </button>
                <button
                  onClick={forceStop}
                  className="flex-shrink-0 bg-slate-700 hover:bg-slate-600 text-red-400 hover:text-red-300 border border-slate-600 px-4 py-1.5 rounded font-semibold text-sm transition-colors"
                >
                  Cancel / Stop
                </button>
              </div>
            )}

            {/* Main Layout - Resizable Panels */}
            <div ref={mainContainerRef} className="flex-1 flex overflow-hidden p-2">

              {/* PANEL 1: Code Trace */}
              <div
                className={`${visiblePanels.code ? "flex" : "hidden"} bg-slate-800 rounded-lg shadow border border-slate-700 flex-col overflow-hidden flex-shrink-0`}
                style={{
                  width: hasRightSidePanels
                    ? `calc(${leftWidth}% - 6px)`
                    : "100%",
                }}
              >
                <input
                  ref={fileInputRef}
                  type="file"
                  accept=".py,.txt,text/x-python"
                  className="hidden"
                  onChange={handleCodeFileChange}
                />
                <div className="bg-slate-900 py-2 px-4 border-b border-slate-700 text-slate-400 text-xs">
                  <div className="flex justify-between items-start gap-3">
                    <div>
                      <div className="font-bold uppercase tracking-wider">
                        Code Trace ({codeFileName || DEFAULT_CODE_FILENAME})
                      </div>
                      <div className="mt-1 normal-case tracking-normal text-[11px] text-slate-500">
                        {codeLabel} • {codeStatus}
                      </div>
                    </div>
                    <div className="flex flex-wrap items-center justify-end gap-2">
                      <button
                        onClick={handleLoadButtonClick}
                        disabled={isRunning || isCodeBusy}
                        className="rounded border border-slate-600 px-2 py-1 text-[11px] font-semibold text-slate-200 hover:border-emerald-400 disabled:opacity-50 disabled:cursor-not-allowed"
                      >
                        Load
                      </button>
                      <button
                        onClick={handleSaveCode}
                        disabled={!hasCode || isCodeBusy}
                        className="rounded border border-slate-600 px-2 py-1 text-[11px] font-semibold text-slate-200 hover:border-amber-400 disabled:opacity-50 disabled:cursor-not-allowed"
                      >
                        Save
                      </button>
                      <span className="min-w-[72px] text-right font-bold uppercase tracking-wider">
                        {currentLine > 0
                          ? `Line ${currentLine}`
                          : hasCode
                            ? "Ready"
                            : "No code"}
                      </span>
                    </div>
                  </div>
                </div>
                <div className="relative flex-1 overflow-hidden bg-slate-950/70">
                  <div ref={editorContainerRef} className="absolute inset-0"></div>
                  {!hasCode && isEditorReady && !editorError && (
                    <div className="pointer-events-none absolute inset-0 flex items-center justify-center px-8 text-center text-slate-500 italic leading-relaxed">
                      Load a local Python file or start typing a new Python
                      script here.
                    </div>
                  )}
                  {!isEditorReady && !editorError && (
                    <div className="absolute inset-0 flex items-center justify-center text-slate-500">
                      Loading Monaco editor...
                    </div>
                  )}
                  {editorError && (
                    <div className="absolute inset-0 flex items-center justify-center px-8 text-center text-red-300">
                      Monaco editor could not be loaded.
                      <br />
                      {editorError}
                    </div>
                  )}
                </div>
              </div>

              {/* Drag handle: left ↔ right */}
              {visiblePanels.code && hasRightSidePanels && (
                <div
                  className="resize-handle-col"
                  onMouseDown={(e) => {
                    e.preventDefault();
                    resizeDragRef.current = "col-main";
                    document.body.style.cursor = "col-resize";
                    document.body.style.userSelect = "none";
                  }}
                >
                  <div
                    className="resize-bar"
                    style={{ width: "3px", height: "48px" }}
                  />
                </div>
              )}

              {/* Right side */}
              {hasRightSidePanels && (
              <div ref={rightSideRef} className="flex flex-col flex-1 overflow-hidden">

                {/* PANEL 2: Inspectors */}
                {visiblePanels.visualizer && (
                <div
                  className={`bg-slate-800 rounded-lg shadow border border-slate-700 flex flex-col overflow-hidden ${hasBottomPanels ? "flex-shrink-0" : "flex-1"}`}
                  style={hasBottomPanels ? { height: `calc(${rightTopHeight}% - 6px)` } : undefined}
                >
                  <div className="bg-slate-900 py-2 px-4 border-b border-slate-700 flex justify-between items-center gap-4">
                    <div>
                      <span className="font-bold uppercase tracking-wider text-slate-400 text-xs">
                        Inspectors
                      </span>
                      <div className="mt-1 text-[11px] text-slate-500">
                        {isMainThreadRuntime
                          ? "Main-thread execution does not expose live frame inspection yet."
                          : "Globals and current locals update from the traced frame."}
                      </div>
                    </div>

                    <div className="flex items-center gap-3">
                      {!isMainThreadRuntime && (
                        <label className="flex items-center gap-2 text-[11px] font-semibold text-slate-400">
                          <input
                            type="checkbox"
                            checked={showInterpreterVars}
                            onChange={(event) =>
                              setShowInterpreterVars(event.target.checked)
                            }
                            className="h-3.5 w-3.5 rounded border-slate-500 bg-slate-900"
                            style={{ accentColor: "#38bdf8" }}
                          />
                          Show runtime vars
                        </label>
                      )}
                      <div className="rounded border border-slate-600 bg-slate-900/70 px-3 py-1 text-[11px] font-bold uppercase tracking-wider text-slate-300">
                        {isMainThreadRuntime ? "Main Thread" : "Trace Worker"}
                      </div>
                    </div>
                  </div>

                  <div className="flex-1 min-h-0 overflow-hidden bg-slate-800/60 p-3">
                    <div className="flex h-full flex-col gap-3 xl:flex-row">
                      <InspectorPane
                        title="Globals"
                        root={globalsInspectorRoot}
                        path={globalsInspectorPath}
                        setPath={setGlobalsInspectorPath}
                        showRuntimeValues={showInterpreterVars}
                        emptyMessage="Global variables appear here once traced execution reaches a live scope."
                        unavailableMessage={
                          isMainThreadRuntime
                            ? "Inspection is unavailable in main-thread mode yet."
                            : ""
                        }
                      />
                      <InspectorPane
                        title="Current Locals"
                        root={localsInspectorRoot}
                        path={localsInspectorPath}
                        setPath={setLocalsInspectorPath}
                        showRuntimeValues={showInterpreterVars}
                        emptyMessage="Current locals appear here once traced execution enters a live frame."
                        unavailableMessage={
                          isMainThreadRuntime
                            ? "Live frame locals are unavailable in main-thread mode yet."
                            : ""
                        }
                      />
                    </div>
                  </div>
                </div>
                )}

                {/* Drag handle: top ↕ bottom (right side) */}
                {visiblePanels.visualizer && hasBottomPanels && (
                  <div
                    className="resize-handle-row"
                    onMouseDown={(e) => {
                      e.preventDefault();
                      resizeDragRef.current = "row-right";
                      document.body.style.cursor = "row-resize";
                      document.body.style.userSelect = "none";
                    }}
                  >
                    <div
                      className="resize-bar"
                      style={{ height: "3px", width: "48px" }}
                    />
                  </div>
                )}

                {/* Bottom row */}
                {hasBottomPanels && (
                <div ref={bottomRowRef} className="flex flex-1 overflow-hidden">

                  {/* PANEL 3: Structure / Canvas */}
                  {visiblePanels.diagram && (
                  <div
                    className={`bg-slate-800 rounded-lg shadow border border-slate-700 flex flex-col overflow-hidden ${visiblePanels.insight ? "flex-shrink-0" : "flex-1"}`}
                    style={visiblePanels.insight ? { width: `calc(${bottomLeftWidth}% - 6px)` } : undefined}
                  >
                    <div className="bg-slate-900 border-b border-slate-700 px-4 py-2 text-slate-400 text-xs">
                      <div className="flex items-start justify-between gap-3">
                        <div>
                          <div className="font-bold uppercase tracking-wider">
                            {isPygameRunActive
                              ? "Pygame Canvas"
                              : diagramView === "uml"
                                ? "Class Diagram"
                                : diagramView === "outline"
                                  ? "Code Outline"
                                  : "Function Hierarchy"}
                          </div>
                          {!isPygameRunActive && (
                            <div className="mt-1 text-[11px] normal-case tracking-normal text-slate-500">
                              {diagramView === "uml"
                                ? `Live from the current editor: ${diagramModel.classes.length} classes detected`
                                : diagramView === "outline"
                                  ? `Live from the current editor: ${countOutlineNodes(outlineModel)} symbols detected`
                                : `Live from the current editor: ${hierarchyModel.orderedNames.length} functions detected`}
                            </div>
                          )}
                        </div>
                        <div className="flex items-start gap-3">
                          {!isPygameRunActive && (
                            <div className="flex rounded-md border border-slate-600 overflow-hidden text-[11px] font-bold">
                              <button
                                onClick={() => setDiagramView("hierarchy")}
                                className={`px-3 py-1 ${diagramView === "hierarchy" ? "bg-emerald-700 text-white" : "bg-slate-800 text-slate-300"}`}
                              >
                                Hierarchy
                              </button>
                              <button
                                onClick={() => setDiagramView("outline")}
                                className={`px-3 py-1 ${diagramView === "outline" ? "bg-emerald-700 text-white" : "bg-slate-800 text-slate-300"}`}
                              >
                                Outline
                              </button>
                              <button
                                onClick={() => setDiagramView("uml")}
                                className={`px-3 py-1 ${diagramView === "uml" ? "bg-emerald-700 text-white" : "bg-slate-800 text-slate-300"}`}
                              >
                                Class Diagram
                              </button>
                            </div>
                          )}
                          {!isPygameRunActive && diagramView !== "outline" && (
                            <div className="flex flex-col items-end gap-1">
                              <div className="text-[10px] uppercase tracking-wider text-slate-500">
                                Font
                              </div>
                              <DiagramFontControls
                                fontSize={diagramFontSize}
                                onDecrease={decreaseDiagramFontSize}
                                onIncrease={increaseDiagramFontSize}
                                canDecrease={diagramFontSize > DIAGRAM_FONT_MIN}
                                canIncrease={diagramFontSize < DIAGRAM_FONT_MAX}

                        </div>
                      </div>
                    </div>
                    <div className="flex-1 overflow-auto p-4">
                      {isPygameRunActive ? (
                        <div className="mx-auto flex h-full w-full max-w-6xl flex-col">

                              hierarchyModel={hierarchyModel}
                              fontSize={diagramFontSize}
                            />
                          )}
                        </div>
                      )}
                    </div>
                  </div>
                  )}

                  {/* Drag handle: Panel 3 ↔ Panel 4 */}
                  {visiblePanels.diagram && visiblePanels.insight && (
                    <div
                      className="resize-handle-col"
                      onMouseDown={(e) => {
                        e.preventDefault();
                        resizeDragRef.current = "col-bottom";
                        document.body.style.cursor = "col-resize";
                        document.body.style.userSelect = "none";
                      }}
                    >
                      <div
                        className="resize-bar"
                        style={{ width: "3px", height: "48px" }}
                      />
                    </div>
                  )}

                  {/* PANEL 4: Explanation & Output */}
                  {visiblePanels.insight && (
                  <div className="bg-slate-800 rounded-lg shadow border border-slate-700 flex flex-col overflow-hidden flex-1">
                    <div className="flex bg-slate-900 border-b border-slate-700">
                      {isPygameRunActive ? (
                        <div className="w-full py-2 px-4 font-bold uppercase tracking-wider text-teal-400 text-xs">
                          Console Output
                        </div>
                      ) : (
                        <>
                          <div className="py-2 px-4 font-bold uppercase tracking-wider text-emerald-400 text-xs border-r border-slate-700 w-1/2">
                            Documentation Notes
                          </div>
                          <div className="py-2 px-4 font-bold uppercase tracking-wider text-teal-400 text-xs w-1/2">
                            Console Output
                          </div>
                        </>
                      )}
                    </div>

                    <div className="flex-1 flex overflow-hidden">
                      {/* Insight box */}
                      {!isPygameRunActive && (
                      <div className="relative flex w-1/2 min-h-0 flex-col border-r border-slate-700 bg-slate-800/50 p-4">
                        <div className="flex items-start justify-between gap-3">
                          <div>
                            <h3 className="text-sm font-bold text-white mb-1">
                              {activeInsightHeading}
                            </h3>
                            <div className="text-[11px] uppercase tracking-wider text-slate-500">
                              {activeInsightKey
                                ? hasCustomInsightNote
                                  ? "Custom Note"
                                  : "Default Note"
                                : "Documentation Notes"}
                            </div>
                          </div>
                          <div className="flex items-center gap-2">
                            {!isInsightEditing ? (
                              <IconButton
                                title="Edit note"
                                onClick={beginEditingInsightNote}
                                disabled={!activeInsightKey}
                              >
                                <svg
                                  className="h-4 w-4"
                                  fill="none"
                                  stroke="currentColor"
                                  viewBox="0 0 24 24"
                                >
                                  <path
                                    strokeLinecap="round"
                                    strokeLinejoin="round"
                                    strokeWidth="2"
                                    d="M15.232 5.232l3.536 3.536M9 13l6.232-6.232a2.5 2.5 0 113.536 3.536L12.536 16.536A4 4 0 019.707 17.707L7 18l.293-2.707A4 4 0 018.464 12.536L14.696 6.304"
                                  />
                                </svg>
                              </IconButton>
                            ) : (
                              <IconButton
                                title="Save note"
                                onClick={() => saveInsightNote(activeInsightKey, noteDraft, true)}
                                disabled={!activeInsightKey}
                              >
                                <svg
                                  className="h-4 w-4"
                                  fill="none"
                                  stroke="currentColor"
                                  viewBox="0 0 24 24"
                                >
                                  <path
                                    strokeLinecap="round"
                                    strokeLinejoin="round"
                                    strokeWidth="2"
                                    d="M5 13l4 4L19 7"
                                  />
                                </svg>
                              </IconButton>
                            )}
                            <IconButton
                              title="Reset note to original"
                              onClick={resetInsightNote}
                              disabled={!activeInsightKey}
                            >
                              <svg
                                className="h-4 w-4"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                              >
                                <path
                                  strokeLinecap="round"
                                  strokeLinejoin="round"
                                  strokeWidth="2"
                                  d="M4 4v5h5M20 20v-5h-5M5.64 18.36A9 9 0 1020 12"
                                />
                              </svg>
                            </IconButton>
                            <IconButton
                              title="Export notes"
                              onClick={() => setShowExportDialog(true)}
                              disabled={!canExportNotes}
                            >
                              <svg
                                className="h-4 w-4"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                              >
                                <path
                                  strokeLinecap="round"
                                  strokeLinejoin="round"
                                  strokeWidth="2"
                                  d="M12 16V4m0 12l4-4m-4 4l-4-4M5 20h14"
                                />
                              </svg>
                            </IconButton>
                          </div>
                        </div>

                        <div className="mt-4 flex min-h-0 flex-1 flex-col">
                          {isInsightEditing ? (
                            <textarea
                              value={noteDraft}
                              onChange={(e) => setNoteDraft(e.target.value)}
                              className="insight-note-editor min-h-0 flex-1"
                              placeholder="Write your revision note for this definition..."
                            />
                          ) : (
                            <p className="min-h-0 flex-1 overflow-auto whitespace-pre-wrap text-slate-300 leading-relaxed">
                              {activeInsightText ||
                                "No note is available for this definition yet."}
                            </p>
                          )}

                          <div className="mt-3 text-[11px] text-slate-500">
                            {isInsightEditing
                              ? "Saves automatically if execution moves to another definition or the program stops."
                              : activeInsightKey
                                ? hasCustomInsightNote
                                  ? "Your saved note is shown here."
                                  : "The built-in note is shown until you save your own version."
                                : "Start tracing to attach documentation notes to live execution points."}
                          </div>
                        </div>

                        {showExportDialog && (
                          <div
                            className="export-modal-backdrop"
                            onClick={() => setShowExportDialog(false)}
                          >
                            <div
                              className="export-modal-card"
                              onClick={(event) => event.stopPropagation()}
                            >
                              <div className="text-sm font-bold text-white">
                                Export Notes
                              </div>
                              <p className="mt-2 text-sm text-slate-300 leading-relaxed">
                                Choose a plain text revision outline or an
                                annotated Python file with your notes inserted
                                as docstrings.
                              </p>
                              <div className="mt-4 flex flex-col gap-3">
                                <button
                                  type="button"
                                  onClick={() => downloadNotesExport("comments")}
                                  className="rounded border border-slate-600 bg-slate-900 px-4 py-3 text-left transition-colors hover:border-emerald-400"
                                >
                                  <div className="font-semibold text-slate-200">
                                    Comments Only
                                  </div>
                                  <div className="mt-1 text-xs text-slate-400">
                                    Exports class and function interfaces with
                                    the notes listed underneath in code order.
                                  </div>
                                </button>
                                <button
                                  type="button"
                                  onClick={() => downloadNotesExport("docstrings")}
                                  className="rounded border border-slate-600 bg-slate-900 px-4 py-3 text-left transition-colors hover:border-emerald-400"
                                >
                                  <div className="font-semibold text-slate-200">
                                    Docstrings
                                  </div>
                                  <div className="mt-1 text-xs text-slate-400">
                                    Exports the current Python code with each
                                    note inserted as a function docstring.
                                  </div>
                                </button>
                              </div>
                              <div className="mt-4 flex justify-end">
                                <button
                                  type="button"
                                  onClick={() => setShowExportDialog(false)}
                                  className="rounded border border-slate-600 px-3 py-1.5 text-sm font-semibold text-slate-300 transition-colors hover:border-slate-400"
                                >
                                  Cancel
                                </button>
                              </div>
                            </div>
                          </div>
                        )}
                      </div>
                      )}

                      {/* Terminal Output */}
                      <div
                        className={`${isPygameRunActive ? "w-full" : "w-1/2"} min-h-0 overflow-auto bg-black p-2 font-mono text-[11px] text-green-400`}
                        ref={outputRef}
                      >
                        <pre className="whitespace-pre-wrap">{outputLog}</pre>
                        {!outputLog && (
                          <span className="text-slate-600">No output yet...</span>
                        )}
                      </div>
                    </div>
                  </div>
                  )}
                </div>
                )}
              </div>
              )}
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
